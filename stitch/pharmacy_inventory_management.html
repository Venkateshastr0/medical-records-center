
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.page{padding:1.5rem;max-width:960px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.page-title{font-size:20px;font-weight:500}
.page-sub{font-size:13px;color:var(--color-text-secondary);margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-num{font-size:22px;font-weight:500}
.blue{color:#185FA5}.red{color:#A32D2D}.green{color:#3B6D11}.amber{color:#854F0B}
.controls{display:flex;gap:10px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary)}
.search-wrap input:focus{outline:none;border-color:#185FA5}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--color-text-secondary);pointer-events:none}
.filter-sel{padding:7px 10px;border-radius:var(--border-radius-md);font-size:13px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.filter-sel:focus{outline:none}
.btn{padding:7px 14px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);transition:background .12s;white-space:nowrap}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:#185FA5;border-color:#185FA5;color:#fff}
.btn.primary:hover{background:#0C447C}
.tbl-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead{background:var(--color-background-secondary)}
th{text-align:left;font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
.med-name{font-weight:500;font-size:13px}
.med-generic{font-size:12px;color:var(--color-text-secondary)}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:500}
.badge.LOW{background:#FCEBEB;color:#A32D2D}
.badge.NORMAL{background:#E6F1FB;color:#185FA5}
.badge.HIGH{background:#EAF3DE;color:#3B6D11}
.stock-bar-bg{height:4px;background:var(--color-background-secondary);border-radius:2px;width:80px;margin-top:4px;overflow:hidden}
.stock-bar{height:4px;border-radius:2px}
.upd-btn{font-size:12px;font-weight:500;color:#185FA5;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:var(--border-radius-md)}
.upd-btn:hover{background:var(--color-background-info,#E6F1FB)}
.empty{text-align:center;padding:2.5rem;color:var(--color-text-secondary);font-size:14px}

/* modal overlay via normal flow */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:20px 22px;width:100%;max-width:420px}
.modal-title{font-size:16px;font-weight:500;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary)}
.field input:focus,.field select:focus{outline:none;border-color:#185FA5}
.field input:disabled{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.new-stock{font-size:13px;margin-top:5px;color:var(--color-text-secondary)}
.new-stock b{color:var(--color-text-primary)}
.modal-footer{display:flex;gap:8px;margin-top:18px}
.modal-footer .btn{flex:1;justify-content:center}
.info-row{display:flex;gap:20px;margin-bottom:16px;padding:12px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.info-item{font-size:12px;color:var(--color-text-secondary)}
.info-item b{display:block;font-size:13px;font-weight:500;color:var(--color-text-primary);margin-top:2px}
.toast{position:fixed;bottom:20px;right:20px;background:#3B6D11;color:#fff;padding:10px 18px;border-radius:var(--border-radius-md);font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300}
.toast.show{opacity:1}
</style>

<div class="page">
  <div class="topbar">
    <div>
      <div class="page-title">Inventory</div>
      <div class="page-sub">Medication stock &amp; supplies</div>
    </div>
    <button class="btn primary" onclick="openAdd()">+ Add medication</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total medications</div><div class="stat-num blue" id="sTot">0</div></div>
    <div class="stat"><div class="stat-label">Low stock alerts</div><div class="stat-num red" id="sLow">0</div></div>
    <div class="stat"><div class="stat-label">Expiring soon</div><div class="stat-num amber" id="sExp">0</div></div>
    <div class="stat"><div class="stat-label">Categories</div><div class="stat-num" id="sCat">0</div></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input type="text" id="searchBox" placeholder="Search by name or generic…" oninput="render()">
    </div>
    <select class="filter-sel" id="statusFilter" onchange="render()">
      <option value="ALL">All stock</option>
      <option value="LOW">Low stock</option>
      <option value="NORMAL">Normal</option>
      <option value="HIGH">High stock</option>
    </select>
    <select class="filter-sel" id="catFilter" onchange="render()">
      <option value="ALL">All categories</option>
    </select>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:26%">Medication</th>
          <th style="width:14%">Category</th>
          <th style="width:16%">Stock</th>
          <th style="width:12%">Unit price</th>
          <th style="width:14%">Expiry</th>
          <th style="width:10%">Status</th>
          <th style="width:8%"></th>
        </tr>
      </thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
</div>

<!-- Update stock modal -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Update stock</div>
    <div class="info-row" id="modalInfo"></div>
    <div class="field"><label>Current stock</label><input type="text" id="curStock" disabled></div>
    <div class="field">
      <label>Quantity change <span style="font-weight:400;text-transform:none">(+ add / − remove)</span></label>
      <input type="number" id="qtyInput" placeholder="e.g. +50 or -10" oninput="previewNew()">
      <div class="new-stock" id="newPreview"></div>
    </div>
    <div class="field">
      <label>Reason</label>
      <select id="reasonSel">
        <option>Stock update</option><option>Prescription issued</option><option>Stock adjustment</option>
        <option>Expired</option><option>Damaged</option><option>Reorder</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="doUpdate()">Update stock</button>
    </div>
  </div>
</div>

<!-- Add medication modal -->
<div class="modal-bg" id="addModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-title">Add new medication</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 14px">
      <div class="field"><label>Brand name</label><input type="text" id="aName" placeholder="e.g. Metformin 500mg"></div>
      <div class="field"><label>Generic name</label><input type="text" id="aGeneric" placeholder="e.g. Metformin HCl"></div>
      <div class="field"><label>Category</label><input type="text" id="aCat" placeholder="e.g. Antidiabetic"></div>
      <div class="field"><label>Manufacturer</label><input type="text" id="aMfr" placeholder="e.g. Sun Pharma"></div>
      <div class="field"><label>Unit price (₹)</label><input type="number" id="aPrice" placeholder="0.00"></div>
      <div class="field"><label>Initial stock</label><input type="number" id="aStock" placeholder="0"></div>
      <div class="field"><label>Reorder level</label><input type="number" id="aReorder" placeholder="10"></div>
      <div class="field"><label>Expiry date</label><input type="month" id="aExpiry"></div>
      <div class="field" style="grid-column:1/-1"><label>Storage location</label><input type="text" id="aLoc" placeholder="e.g. Rack A, Shelf 2"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAdd()">Cancel</button>
      <button class="btn primary" onclick="doAdd()">Add medication</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SOON = 90*24*3600*1000;
let meds = [
  {id:1,mid:'MED-001',name:'Metformin 500mg',generic:'Metformin HCl',cat:'Antidiabetic',price:45,stock:320,reorder:50,mfr:'Sun Pharma',expiry:'2026-08',loc:'Rack A1',status:'HIGH'},
  {id:2,mid:'MED-002',name:'Amlodipine 5mg',generic:'Amlodipine Besylate',cat:'Antihypertensive',price:32,stock:18,reorder:30,mfr:'Cipla',expiry:'2026-05',loc:'Rack B2',status:'LOW'},
  {id:3,mid:'MED-003',name:'Atorvastatin 10mg',generic:'Atorvastatin Calcium',cat:'Antilipidemic',price:68,stock:95,reorder:40,mfr:'Dr Reddy\'s',expiry:'2026-12',loc:'Rack A3',status:'NORMAL'},
  {id:4,mid:'MED-004',name:'Amoxicillin 500mg',generic:'Amoxicillin Trihydrate',cat:'Antibiotic',price:55,stock:12,reorder:40,mfr:'Alkem',expiry:'2026-04',loc:'Rack C1',status:'LOW'},
  {id:5,mid:'MED-005',name:'Pantoprazole 40mg',generic:'Pantoprazole Sodium',cat:'PPI',price:42,stock:210,reorder:60,mfr:'Zydus',expiry:'2027-03',loc:'Rack B1',status:'HIGH'},
  {id:6,mid:'MED-006',name:'Paracetamol 650mg',generic:'Acetaminophen',cat:'Analgesic',price:18,stock:45,reorder:50,mfr:'GSK',expiry:'2026-09',loc:'Rack D2',status:'NORMAL'},
  {id:7,mid:'MED-007',name:'Azithromycin 250mg',generic:'Azithromycin Dihydrate',cat:'Antibiotic',price:88,stock:8,reorder:20,mfr:'Pfizer',expiry:'2026-06',loc:'Rack C2',status:'LOW'},
  {id:8,mid:'MED-008',name:'Montelukast 10mg',generic:'Montelukast Sodium',cat:'Antiasthmatic',price:54,stock:130,reorder:30,mfr:'MSD',expiry:'2027-01',loc:'Rack E1',status:'NORMAL'},
  {id:9,mid:'MED-009',name:'Cetirizine 10mg',generic:'Cetirizine HCl',cat:'Antihistamine',price:22,stock:75,reorder:40,mfr:'Cipla',expiry:'2026-07',loc:'Rack D1',status:'NORMAL'},
  {id:10,mid:'MED-010',name:'Domperidone 10mg',generic:'Domperidone Maleate',cat:'Antiemetic',price:25,stock:5,reorder:30,mfr:'Janssen',expiry:'2026-05',loc:'Rack B3',status:'LOW'},
];
let editTarget = null;
let nextId = 11;

function expiryMs(e){if(!e)return Infinity;const[y,m]=e.split('-');return new Date(+y,+m-1,1).getTime()}
function isExpSoon(e){const d=expiryMs(e)-Date.now();return d>0&&d<SOON}
function barColor(s){return s==='LOW'?'#E24B4A':s==='HIGH'?'#639922':'#378ADD'}
function barPct(stock,reorder){return Math.min(100,Math.round(stock/Math.max(reorder*3,1)*100))}
function fmt(n){return '₹'+Number(n).toFixed(2)}
function fmtExpiry(e){if(!e)return '—';const[y,m]=e.split('-');return new Date(+y,+m-1,1).toLocaleDateString('en-IN',{month:'short',year:'numeric'})}

function updateStats(){
  document.getElementById('sTot').textContent=meds.length;
  document.getElementById('sLow').textContent=meds.filter(m=>m.status==='LOW').length;
  document.getElementById('sExp').textContent=meds.filter(m=>isExpSoon(m.expiry)).length;
  document.getElementById('sCat').textContent=new Set(meds.map(m=>m.cat)).size;
}

function populateCatFilter(){
  const sel=document.getElementById('catFilter');
  const cats=[...new Set(meds.map(m=>m.cat))].sort();
  const cur=sel.value;
  sel.innerHTML='<option value="ALL">All categories</option>'+cats.map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
}

function render(){
  updateStats(); populateCatFilter();
  const q=document.getElementById('searchBox').value.toLowerCase();
  const sf=document.getElementById('statusFilter').value;
  const cf=document.getElementById('catFilter').value;
  const list=meds.filter(m=>{
    const ms=(m.name+' '+m.generic).toLowerCase().includes(q);
    const ss=sf==='ALL'||m.status===sf;
    const cs=cf==='ALL'||m.cat===cf;
    return ms&&ss&&cs;
  });
  const tb=document.getElementById('tBody');
  if(!list.length){tb.innerHTML='<tr><td colspan="7" class="empty">No medications found.</td></tr>';return}
  tb.innerHTML=list.map(m=>{
    const soon=isExpSoon(m.expiry);
    const expStyle=soon?'color:#854F0B;font-weight:500':'';
    const pct=barPct(m.stock,m.reorder);
    return `<tr>
      <td><div class="med-name">${m.name}</div><div class="med-generic">${m.generic}</div></td>
      <td style="color:var(--color-text-secondary);font-size:12px">${m.cat}</td>
      <td>
        <div style="font-weight:500">${m.stock} <span style="font-weight:400;color:var(--color-text-secondary);font-size:11px">/ min ${m.reorder}</span></div>
        <div class="stock-bar-bg"><div class="stock-bar" style="width:${pct}%;background:${barColor(m.status)}"></div></div>
      </td>
      <td style="font-weight:500">${fmt(m.price)}</td>
      <td style="${expStyle}">${fmtExpiry(m.expiry)}${soon?' ⚠':''}
        <div style="font-size:11px;color:var(--color-text-secondary)">${m.loc}</div>
      </td>
      <td><span class="badge ${m.status}">${m.status}</span></td>
      <td><button class="upd-btn" onclick="openEdit(${m.id})">Update</button></td>
    </tr>`;
  }).join('');
}

function openEdit(id){
  editTarget=meds.find(m=>m.id===id);
  if(!editTarget)return;
  document.getElementById('modalTitle').textContent='Update stock — '+editTarget.name;
  document.getElementById('modalInfo').innerHTML=`
    <div class="info-item"><span>Manufacturer</span><b>${editTarget.mfr}</b></div>
    <div class="info-item"><span>Unit price</span><b>${fmt(editTarget.price)}</b></div>
    <div class="info-item"><span>Location</span><b>${editTarget.loc}</b></div>
  `;
  document.getElementById('curStock').value=editTarget.stock;
  document.getElementById('qtyInput').value='';
  document.getElementById('newPreview').innerHTML='';
  document.getElementById('editModal').classList.add('show');
}

function previewNew(){
  if(!editTarget)return;
  const v=parseInt(document.getElementById('qtyInput').value)||0;
  const nv=editTarget.stock+v;
  const col=nv<0?'#A32D2D':'var(--color-text-primary)';
  document.getElementById('newPreview').innerHTML=`New stock: <b style="color:${col}">${nv}</b>`;
}

function doUpdate(){
  if(!editTarget)return;
  const v=parseInt(document.getElementById('qtyInput').value);
  if(isNaN(v)){showToast('Enter a quantity change');return}
  const nv=editTarget.stock+v;
  if(nv<0){showToast('Stock cannot go below 0');return}
  editTarget.stock=nv;
  editTarget.status=nv<=0?'LOW':nv<editTarget.reorder?'LOW':nv>editTarget.reorder*3?'HIGH':'NORMAL';
  closeModal(); render();
  showToast('Stock updated for '+editTarget.name);
}

function closeModal(){document.getElementById('editModal').classList.remove('show')}

function openAdd(){
  ['aName','aGeneric','aCat','aMfr','aPrice','aStock','aReorder','aExpiry','aLoc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('addModal').classList.add('show');
}
function closeAdd(){document.getElementById('addModal').classList.remove('show')}
function doAdd(){
  const name=document.getElementById('aName').value.trim();
  if(!name){showToast('Enter medication name');return}
  const stock=parseInt(document.getElementById('aStock').value)||0;
  const reorder=parseInt(document.getElementById('aReorder').value)||10;
  const price=parseFloat(document.getElementById('aPrice').value)||0;
  const status=stock<=0?'LOW':stock<reorder?'LOW':stock>reorder*3?'HIGH':'NORMAL';
  meds.push({
    id:nextId++, mid:'MED-'+String(nextId).padStart(3,'0'),
    name, generic:document.getElementById('aGeneric').value.trim(),
    cat:document.getElementById('aCat').value.trim()||'General',
    price, stock, reorder,
    mfr:document.getElementById('aMfr').value.trim(),
    expiry:document.getElementById('aExpiry').value||'',
    loc:document.getElementById('aLoc').value.trim(),
    status
  });
  closeAdd(); render();
  showToast(name+' added to inventory');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

render();
</script>
